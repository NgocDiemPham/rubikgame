<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D RUBIK OF THE OLD COLLECTIVE QUARTERS - Absolute Fix</title>
    <style>
        body { margin: 0; background-color: #1a1a1a; font-family: Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; color: white; user-select: none; }
        #info { text-align: center; position: absolute; top: 10px; width: 100%; pointer-events: none; z-index: 10; }
        #info h2 { margin: 5px; color: #28a745; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .container { perspective: 1200px; width: 300px; height: 300px; display: flex; align-items: center; justify-content: center; margin-bottom: 60px; cursor: move; touch-action: none; }
        .rubik { width: 300px; height: 300px; position: relative; transform-style: preserve-3d; transform: rotateX(-25deg) rotateY(45deg); transition: transform 0.1s linear; }
        .face { position: absolute; width: 300px; height: 300px; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); box-sizing: border-box; background: #000; border: 2px solid #000; backface-visibility: hidden; }
        
        .face-F { transform: translateZ(150px); }
        .face-B { transform: rotateY(180deg) translateZ(150px); }
        .face-L { transform: rotateY(-90deg) translateZ(150px); }
        .face-R { transform: rotateY(90deg) translateZ(150px); }
        .face-U { transform: rotateX(90deg) translateZ(150px); }
        .face-D { transform: rotateX(-90deg) translateZ(150px); }

        .piece { 
            box-sizing: border-box; 
            border: 1px solid rgba(0,0,0,0.4); 
            background-size: 300px 300px !important;
            background-repeat: no-repeat !important;
            width: 100px;
            height: 100px;
        }

        #menu { position: absolute; bottom: 20px; background: rgba(0, 0, 0, 0.85); padding: 15px; border-radius: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 100; border: 1px solid #444; }
        button { background: #333; color: white; border: 1px solid #555; padding: 10px; font-size: 13px; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #555; border-color: #28a745; }
        button.special { background: #28a745; grid-column: span 3; margin-top: 5px; }
        button.special:hover { background: #218838; transform: scale(1.02); }
    </style>
</head>
<body>

    <div id="info">
        <h2>3D RUBIK'S MEMORIES</h2>
        <p>Use the buttons to rotate and stitch our class photos back together</p>
    </div>

    <div class="container" id="cubeContainer">
        <div class="rubik" id="rubikCube">
            <div class="face face-F" id="face-F"></div>
            <div class="face face-B" id="face-B"></div>
            <div class="face face-L" id="face-L"></div>
            <div class="face face-R" id="face-R"></div>
            <div class="face face-U" id="face-U"></div>
            <div class="face face-D" id="face-D"></div>
        </div>
    </div>

    <div id="menu">
        <button onclick="rotateLayer('U', true)">U (UP)</button>
        <button onclick="rotateLayer('R', true)">R (RIGHT)</button>
        <button onclick="rotateLayer('F', true)">F (FRONT)</button>
        <button onclick="rotateLayer('U', false)">U' (UP PRIME)</button>
        <button onclick="rotateLayer('R', false)">R' (RIGHT PRIME)</button>
        <button onclick="rotateLayer('F', false)">F' (FRONT PRIME)</button>
        <button class="special" onclick="autoSolve()">AUTO (SOLVE)</button>
    </div>

    <script>
        const faces = ['F', 'B', 'L', 'R', 'U', 'D'];
        const IMAGE_FILES = {
            'F': 'pic01.jpg', 'B': 'pic02.jpg',
            'L': 'pic03.jpg', 'R': 'pic04.jpg',
            'U': 'pic05.jpg', 'D': 'pic06.jpg'
        };

        let cubeState = {};
        let moveHistory = [];
        let isRotating = false;

        function initCube() {
            faces.forEach(f => {
                cubeState[f] = [];
                const faceEl = document.getElementById(`face-${f}`);
                faceEl.innerHTML = '';
                for (let r = 0; r < 3; r++) {
                    cubeState[f][r] = [];
                    for (let c = 0; c < 3; c++) {
                        // Lưu trữ vị trí cắt ảnh thực tế (bgX, bgY) thay vì dùng hàm rotate của CSS
                        cubeState[f][r][c] = { f: f, bgX: c * 50, bgY: r * 50 };
                        let div = document.createElement('div');
                        div.className = 'piece';
                        div.id = `piece-${f}-${r}-${c}`;
                        faceEl.appendChild(div);
                    }
                }
            });
            render();
        }

        function render() {
            faces.forEach(f => {
                for (let r = 0; r < 3; r++) {
                    for (let c = 0; c < 3; c++) {
                        const data = cubeState[f][r][c];
                        const el = document.getElementById(`piece-${f}-${r}-${c}`);
                        el.style.backgroundImage = `url('${IMAGE_FILES[data.f]}')`;
                        el.style.backgroundPosition = `${data.bgX}% ${data.bgY}%`;
                    }
                }
            });
        }

        function rotFace(arr, cw) {
            let res = Array.from({length: 3}, () => []);
            for(let r=0; r<3; r++) {
                for(let c=0; c<3; c++) {
                    if(cw) res[c][2-r] = arr[r][c];
                    else res[2-c][r] = arr[r][c];
                }
            }
            return res;
        }

        function rotateLayer(move, cw, isSolving = false) {
            if (isRotating) return;
            isRotating = true;
            if (!isSolving) moveHistory.push({ move, cw });

            cubeState[move] = rotFace(cubeState[move], cw);

            if (move === 'U') {
                let tmp = [cubeState.F[0][0], cubeState.F[0][1], cubeState.F[0][2]];
                if(cw) {
                    for(let i=0; i<3; i++) { cubeState.F[0][i] = cubeState.R[0][i]; cubeState.R[0][i] = cubeState.B[0][i]; cubeState.B[0][i] = cubeState.L[0][i]; cubeState.L[0][i] = tmp[i]; }
                } else {
                    for(let i=0; i<3; i++) { cubeState.F[0][i] = cubeState.L[0][i]; cubeState.L[0][i] = cubeState.B[0][i]; cubeState.B[0][i] = cubeState.R[0][i]; cubeState.R[0][i] = tmp[i]; }
                }
            } 
            else if (move === 'R') {
                let tmpF = [cubeState.F[0][2], cubeState.F[1][2], cubeState.F[2][2]];
                if(cw) {
                    for(let i=0; i<3; i++) {
                        cubeState.F[i][2] = cubeState.D[i][2];
                        cubeState.D[i][2] = cubeState.B[2-i][0];
                        cubeState.B[2-i][0] = cubeState.U[i][2];
                        cubeState.U[i][2] = tmpF[i];
                    }
                } else {
                    for(let i=0; i<3; i++) {
                        cubeState.F[i][2] = cubeState.U[i][2];
                        cubeState.U[i][2] = cubeState.B[2-i][0];
                        cubeState.B[2-i][0] = cubeState.D[i][2];
                        cubeState.D[i][2] = tmpF[i];
                    }
                }
            }
            else if (move === 'F') {
                let tmpU = [cubeState.U[2][0], cubeState.U[2][1], cubeState.U[2][2]];
                if(cw) {
                    for(let i=0; i<3; i++) {
                        cubeState.U[2][i] = cubeState.L[2-i][2];
                        cubeState.L[2-i][2] = cubeState.D[0][2-i];
                        cubeState.D[0][2-i] = cubeState.R[i][0];
                        cubeState.R[i][0] = tmpU[i];
                    }
                } else {
                    for(let i=0; i<3; i++) {
                        cubeState.U[2][i] = cubeState.R[i][0];
                        cubeState.R[i][0] = cubeState.D[0][2-i];
                        cubeState.D[0][2-i] = cubeState.L[2-i][2];
                        cubeState.L[2-i][2] = tmpU[i];
                    }
                }
            }

            render();
            setTimeout(() => { isRotating = false; }, 160);
        }

        function autoSolve() {
            if (isRotating || moveHistory.length === 0) return;
            const last = moveHistory.pop();
            rotateLayer(last.move, !last.cw, true);
            setTimeout(autoSolve, 250);
        }

        // Camera control đồng bộ hệ trục không gian mẫu
        let cube = document.getElementById('rubikCube'), isDown = false, x = 45, y = -25, px, py;
        document.addEventListener('mousedown', e => { if(e.target.tagName !== 'BUTTON') { isDown = true; px = e.clientX; py = e.clientY; } });
        document.addEventListener('mousemove', e => {
            if(!isDown) return;
            x += (e.clientX - px) * 0.5; y -= (e.clientY - py) * 0.5;
            cube.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
            px = e.clientX; py = e.clientY;
        });
        document.addEventListener('mouseup', () => isDown = false);
        
        document.addEventListener('touchstart', e => { if(e.target.tagName !== 'BUTTON') { isDown = true; px = e.touches[0].clientX; py = e.touches[0].clientY; } });
        document.addEventListener('touchmove', e => {
            if(!isDown) return;
            x += (e.touches[0].clientX - px) * 0.5; y -= (e.touches[0].clientY - py) * 0.5;
            cube.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
            px = e.touches[0].clientX; py = e.touches[0].clientY;
        });
        document.addEventListener('touchend', () => isDown = false);

        initCube();
    </script>
</body>
</html>
