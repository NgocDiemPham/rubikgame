<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Ghép Tranh Rubik 3D Offline</title>
    <style>
        body { margin: 0; background-color: #1a1a1a; font-family: Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; color: white; }
        
        #info { text-align: center; position: absolute; top: 10px; width: 100%; pointer-events: none; }
        #info h2 { margin: 5px; }
        
        /* Khung chứa Rubik và hiệu ứng xoay Camera */
        .container { perspective: 1000px; width: 300px; height: 300px; display: flex; align-items: center; justify-content: center; margin-bottom: 50px; cursor: move; }
        
        .rubik { width: 300px; height: 300px; position: relative; transform-style: preserve-3d; transform: rotateX(-30deg) rotateY(45deg); transition: transform 0.1s linear; }
        
        /* Định nghĩa các mặt lớn của Rubik */
        .face { position: absolute; width: 300px; height: 300px; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); box-sizing: border-box; background: rgba(0,0,0,0.5); border: 4px solid #1a1a1a; }
        
        /* Vị trí 3D của 6 mặt */
        .face-F { transform: translateZ(150px); }
        .face-B { transform: rotateY(180deg) translateZ(150px); }
        .face-L { transform: rotateY(-90deg) translateZ(150px); }
        .face-R { transform: rotateY(90deg) translateZ(150px); }
        .face-U { transform: rotateX(90deg) translateZ(150px); }
        .face-D { transform: rotateX(-90deg) translateZ(150px); }
        
        /* Các ô nhỏ (Mảnh ghép tranh) */
        .piece { box-sizing: border-box; border: 2px solid #1a1a1a; background-size: 300px 300px; background-repeat: no-repeat; transition: transform 0.4s ease-in-out; }
        
        /* Giao diện Menu điều khiển */
        #menu { position: absolute; bottom: 20px; background: rgba(0, 0, 0, 0.85); padding: 15px; border-radius: 10px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        button { background: #333; color: white; border: 1px solid #555; padding: 10px 15px; font-size: 14px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        button:hover { background: #555; }
        button.special { background: #28a745; grid-column: span 3; }
        button.special:hover { background: #218838; }
    </style>
</head>
<body>

    <div id="info">
        <h2>GAME GHÉP TRANH RUBIK 3D</h2>
        <p>Giữ chuột trái và kéo để xoay camera xem các mặt ảnh!</p>
    </div>

    <div class="container" id="cubeContainer">
        <div class="rubik" id="rubikCube">
            <div class="face face-R" id="face-R"></div>
            <div class="face face-L" id="face-L"></div>
            <div class="face face-U" id="face-U"></div>
            <div class="face face-D" id="face-D"></div>
            <div class="face face-F" id="face-F"></div>
            <div class="face face-B" id="face-B"></div>
        </div>
    </div>

    <div id="menu">
        <button onclick="rotateLayer('U', true)">U (Trên)</button>
        <button onclick="rotateLayer('R', true)">R (Phải)</button>
        <button onclick="rotateLayer('F', true)">F (Trước)</button>
        
        <button onclick="rotateLayer('U', false)">U' (Trên Ngược)</button>
        <button onclick="rotateLayer('R', false)">R' (Phải Ngược)</button>
        <button onclick="rotateLayer('F', false)">F' (Trước Ngược)</button>
        
        <button class="special" onclick="autoSolve()">TỰ ĐỘNG GIẢI (SOLVE)</button>
    </div>

    <script>
        // Tên các file ảnh PNG nằm trong thư mục của bạn
        const IMAGE_FILES = {
            'R': 'pic1.png',
            'L': 'pic2.png',
            'U': 'pic3.png',
            'D': 'pic4.png',
            'F': 'pic5.png',
            'B': 'pic6.png'
        };

        // Khởi tạo dữ liệu trạng thái cho 6 mặt Rubik (Mạng lưới 3x3 chứa thông tin ảnh và vị trí cắt)
        const cubeState = {};
        const moveHistory = [];
        let isRotating = false;

        function initCube() {
            const faces = ['R', 'L', 'U', 'D', 'F', 'B'];
            faces.forEach(f => {
                cubeState[f] = [];
                const faceElement = document.getElementById(`face-${f}`);
                faceElement.innerHTML = '';

                for (let row = 0; row < 3; row++) {
                    cubeState[f][row] = [];
                    for (let col = 0; col < 3; col++) {
                        // Lưu thông tin mảnh cắt gốc
                        const pieceData = { face: f, row: row, col: col };
                        cubeState[f][row][col] = pieceData;

                        const pieceDiv = document.createElement('div');
                        pieceDiv.className = 'piece';
                        pieceDiv.id = `p-${f}-${row}-${col}`;
                        
                        // Áp ảnh và tính tọa độ cắt ảnh CSS thông thường (Không lo lỗi bảo mật)
                        pieceDiv.style.backgroundImage = `url(${IMAGE_FILES[f]})`;
                        pieceDiv.style.backgroundPosition = `${col * 50}% ${row * 50}%`;
                        
                        faceElement.appendChild(pieceDiv);
                    }
                }
            });
        }

        // Cập nhật lại giao diện hình ảnh dựa trên mảng dữ liệu logic sau khi xoay
        function renderCubeState() {
            const faces = ['R', 'L', 'U', 'D', 'F', 'B'];
            faces.forEach(f => {
                for (let row = 0; row < 3; row++) {
                    for (let col = 0; col < 3; col++) {
                        const data = cubeState[f][row][col];
                        const pieceDiv = document.getElementById(`p-${f}-${row}-${col}`);
                        pieceDiv.style.backgroundImage = `url(${IMAGE_FILES[data.face]})`;
                        pieceDiv.style.backgroundPosition = `${data.col * 50}% ${data.row * 50}%`;
                    }
                }
            });
        }

        // --- HÀM XOAY LOGIC RUBIK ---
        function rotateMatrixClockwise(matrix) {
            const n = matrix.length;
            const res = JSON.parse(JSON.stringify(matrix));
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) res[j][n - 1 - i] = matrix[i][j];
            }
            return res;
        }

        function rotateMatrixCounterClockwise(matrix) {
            const n = matrix.length;
            const res = JSON.parse(JSON.stringify(matrix));
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) res[n - 1 - j][i] = matrix[i][j];
            }
            return res;
        }

        function rotateLayer(face, isClockwise, isSolving = false) {
            if (isRotating) return;
            isRotating = true;

            if (!isSolving) {
                moveHistory.push({ face: face, isClockwise: isClockwise });
            }

            // Xoay mặt chính
            if (isClockwise) {
                cubeState[face] = rotateMatrixClockwise(cubeState[face]);
            } else {
                cubeState[face] = rotateMatrixCounterClockwise(cubeState[face]);
            }

            // Xoay các hàng biên liền kề nối với mặt đó
            const temp = [cubeState.F[0][0], cubeState.F[0][1], cubeState.F[0][2]];
            
            if (face === 'U') {
                if (isClockwise) {
                    const tempRow = [...cubeState.F[0]];
                    cubeState.F[0] = [...cubeState.R[0]];
                    cubeState.R[0] = [...cubeState.B[0]];
                    cubeState.B[0] = [...cubeState.L[0]];
                    cubeState.L[0] = tempRow;
                } else {
                    const tempRow = [...cubeState.F[0]];
                    cubeState.F[0] = [...cubeState.L[0]];
                    cubeState.L[0] = [...cubeState.B[0]];
                    cubeState.B[0] = [...cubeState.R[0]];
                    cubeState.R[0] = tempRow;
                }
            } 
            else if (face === 'R') {
                if (isClockwise) {
                    for(let i=0; i<3; i++) {
                        let t = cubeState.F[i][2];
                        cubeState.F[i][2] = cubeState.D[i][2];
                        cubeState.D[i][2] = cubeState.B[2-i][0];
                        cubeState.B[2-i][0] = cubeState.U[i][2];
                        cubeState.U[i][2] = t;
                    }
                } else {
                    for(let i=0; i<3; i++) {
                        let t = cubeState.F[i][2];
                        cubeState.F[i][2] = cubeState.U[i][2];
                        cubeState.U[i][2] = cubeState.B[2-i][0];
                        cubeState.B[2-i][0] = cubeState.D[i][2];
                        cubeState.D[i][2] = t;
                    }
                }
            }
            else if (face === 'F') {
                if (isClockwise) {
                    for(let i=0; i<3; i++) {
                        let t = cubeState.U[2][i];
                        cubeState.U[2][i] = cubeState.L[2-i][2];
                        cubeState.L[2-i][2] = cubeState.D[0][2-i];
                        cubeState.D[0][2-i] = cubeState.R[i][0];
                        cubeState.R[i][0] = t;
                    }
                } else {
                    for(let i=0; i<3; i++) {
                        let t = cubeState.U[2][i];
                        cubeState.U[2][i] = cubeState.R[i][0];
                        cubeState.R[i][0] = cubeState.D[0][2-i];
                        cubeState.D[0][2-i] = cubeState.L[2-i][2];
                        cubeState.L[2-i][2] = t;
                    }
                }
            }

            // Cập nhật lại hình ảnh hiển thị sau khi tính toán xong xuôi
            renderCubeState();
            
            setTimeout(() => {
                isRotating = false;
            }, 100);
        }

        // --- HÀM TỰ ĐỘNG GIẢI (SOLVE) ---
        function autoSolve() {
            if (isRotating) return;
            if (moveHistory.length === 0) {
                alert("Rubik đã được giải về vị trí ban đầu!");
                return;
            }

            const lastMove = moveHistory.pop();
            // Xoay ngược hướng đi cũ (!lastMove.isClockwise)
            rotateLayer(lastMove.face, !lastMove.isClockwise, true);

            setTimeout(() => {
                autoSolve();
            }, 300);
        }

        // --- HIỆU ỨNG XOAY CAMERA BẰNG CHUỘT ---
        const container = document.getElementById('cubeContainer');
        const cube = document.getElementById('rubikCube');
        let isDragging = false;
        let currentX = 45;
        let currentY = -30;
        let previousMouseX, previousMouseY;

        container.addEventListener('mousedown', (e) => {
            isDragging = true;
            previousMouseX = e.clientX;
            previousMouseY = e.clientY;
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - previousMouseX;
            const deltaY = e.clientY - previousMouseY;

            currentX += deltaX * 0.5;
            currentY -= deltaY * 0.5;

            // Giới hạn góc nhìn lên xuống để tránh bị lật ngược camera
            currentY = Math.max(-85, Math.min(85, currentY));

            cube.style.transform = `rotateX(${currentY}deg) rotateY(${currentX}deg)`;

            previousMouseX = e.clientX;
            previousMouseY = e.clientY;
        });

        document.addEventListener('mouseup', () => { isDragging = false; });

        // Chạy khởi tạo game
        initCube();
    </script>
</body>
</html>
